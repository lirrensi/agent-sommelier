<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban — Tasks</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app" x-data="kanban" @keydown.window="modalOpen && ($event.key === 'Escape' ? closeModal() : null)">
    <!-- ─── Status Bar ─── -->
    <header class="status-bar" :class="connected ? 'connected' : 'disconnected'">
      <div class="status-left">
        <span class="dot" :class="connected ? 'live' : 'dead'"></span>
        <span class="board-title" x-text="connected ? 'Tasks' : 'Reconnecting...'"></span>
        <span class="sep">|</span>
        <span class="count-badge" x-text="(overview?.counts.active ?? 0) + ' active'"></span>
      </div>
      <div class="status-right">
        <!-- Search -->
        <div class="search-box">
          <input type="text"
                 x-model="searchQuery"
                 placeholder="Search cards..."
                 class="search-input">
          <button class="btn-clear-search"
                  x-show="searchQuery"
                  @click="searchQuery = ''">✕</button>
        </div>
        <!-- Filter indicators -->
        <template x-if="filterTags.length || filterClaimed || filterPriority !== null">
          <button class="btn-filter-active" @click="clearFilters()">
            Filters · <span x-text="filteredCount()"></span>
          </button>
        </template>
      </div>
    </header>

    <!-- ─── Kanban Board ─── -->
    <main class="board" x-show="overview">
      <template x-for="status in (overview?.statuses || [])" :key="status">
        <section class="column" :data-status="status">
          <!-- Column Header -->
          <div class="column-header" @click="toggleCollapse(status)">
            <div class="column-header-left">
              <span class="column-title" x-text="status"></span>
              <span class="column-count" x-text="tasksByStatus(status).length"></span>
            </div>
            <div class="column-header-right">
              <span class="collapse-icon" x-text="isCollapsed(status) ? '▶' : '▼'"></span>
              <button class="btn-add-card-header"
                      @click.stop="openCreateModal(status)"
                      title="Add card">+</button>
              <div class="col-menu" @click.stop>
                <button class="btn-col-menu" title="Column actions">⋮</button>
                <div class="col-menu-dropdown">
                  <button @click="closeAllInColumn(status)">Close all</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Column Body -->
          <div class="column-body" x-show="!isCollapsed(status)">
            <!-- Card List (SortableJS container) -->
            <div class="card-list">
              <template x-for="task in tasksByStatus(status)" :key="task.id">
                <div class="task-card"
                     :class="['p' + (task.priority ?? 4), task.closed ? 'closed' : '']"
                     :data-task-id="task.id"
                     @click="openModal(task)">
                  <!-- Priority bar -->
                  <div class="card-priority" :class="'bar-p' + (task.priority ?? 4)"></div>
                  <!-- Title -->
                  <div class="card-title" x-text="task.title"></div>
                  <!-- Tags -->
                  <div class="card-tags" x-show="task.tags?.length">
                    <template x-for="tag in task.tags || []" :key="tag">
                      <span class="tag"
                            x-text="tag"
                            @click.stop="toggleFilterTag(tag)"
                            :class="{'tag-filtered': filterTags.includes(tag)}"></span>
                    </template>
                  </div>
                  <!-- Footer -->
                  <div class="card-footer">
                    <span class="card-claimed"
                          x-show="task.claimed && !task.closed"
                          x-text="task.claimed"
                          @click.stop="setFilterClaimed(task.claimed)"
                          :class="{'filter-active': filterClaimed === task.claimed}"></span>
                    <span class="card-closed-badge" x-show="task.closed" title="Archived">✓ Closed</span>
                    <div class="card-indicators">
                      <span class="card-indicator" x-show="task.notes?.length" title="Has notes">📝</span>
                      <span class="card-indicator" x-show="task.deps?.length" title="Has dependencies">🔗</span>
                      <span class="card-indicator priority-indicator"
                            x-text="'p' + (task.priority ?? 4)"
                            @click.stop="setFilterPriority(task.priority ?? 2)"
                            :class="{'filter-active': filterPriority === (task.priority ?? 2)}"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Empty state -->
            <div class="empty-cards"
                 x-show="tasksByStatus(status).length === 0"
                 x-text="'No cards'"></div>
          </div>
        </section>
      </template>
      <div class="board-end"></div>
    </main>

    <!-- ─── Empty Board State ─── -->
    <div class="board-empty" x-show="!overview">
      <p>Waiting for server...</p>
    </div>

    <!-- ─── Modal Overlay ─── -->
    <div class="modal-overlay"
         x-show="modalOpen"
         x-cloak
         x-transition:enter.duration.200ms>
      <div class="modal-backdrop" @click="closeModal()"></div>
      <div class="modal" x-show="modalOpen">
        <!-- ── Create Mode ── -->
        <template x-if="modalMode === 'create'">
          <div>
            <div class="modal-header">
              <span class="modal-id">New Task</span>
              <div class="modal-header-actions">
                <button class="btn-modal-close" @click="closeModal()">✕</button>
              </div>
            </div>
            <div class="modal-body">
              <div class="field">
                <label>Title</label>
                <input type="text"
                       x-model="modalEditTitle"
                       class="field-input field-title modal-title-input"
                       placeholder="Task title...">
              </div>
              <div class="field-row">
                <div class="field field-half">
                  <label>Status</label>
                  <select x-model="modalEditStatus" class="field-input">
                    <template x-for="s in (overview?.statuses || [])" :key="s">
                      <option :value="s" x-text="s"></option>
                    </template>
                  </select>
                </div>
                <div class="field field-half">
                  <label>Priority</label>
                  <select x-model="modalEditPriority" class="field-input">
                    <option value="0">P0 — Critical</option>
                    <option value="1">P1 — High</option>
                    <option value="2">P2 — Medium</option>
                    <option value="3">P3 — Low</option>
                    <option value="4">P4 — Backlog</option>
                  </select>
                </div>
              </div>
              <div class="field">
                <label>Staff (assignee)</label>
                <input type="text"
                       x-model="modalEditClaimed"
                       class="field-input"
                       placeholder="Anyone's name...">
              </div>
              <div class="field">
                <label>Tags (comma-separated)</label>
                <input type="text"
                       x-model="modalEditTags"
                       class="field-input"
                       placeholder="bug, frontend, urgent...">
              </div>
              <div class="field">
                <label>Notes</label>
                <textarea x-model="modalEditNotes"
                          class="field-input field-textarea"
                          placeholder="Add notes here..."
                          rows="6"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-save" @click="saveModal()">Create</button>
              <button class="btn-cancel" @click="closeModal()">Cancel</button>
            </div>
          </div>
        </template>

        <!-- ── Edit Mode ── -->
        <template x-if="modalMode === 'edit' && modalTask">
          <div>
            <div class="modal-header">
              <span class="modal-id" x-text="modalTask.id"></span>
              <div class="modal-header-actions">
                <button class="btn-modal-action btn-close" @click="closeTask(modalTask.id)" title="Close (archive)">✓ Close</button>
                <button class="btn-modal-action btn-delete" @click="deleteTask(modalTask.id)" title="Delete permanently">✕ Delete</button>
                <button class="btn-modal-close" @click="closeModal()">✕</button>
              </div>
            </div>
            <div class="modal-body">
              <div class="field">
                <label>Title</label>
                <input type="text"
                       x-model="modalEditTitle"
                       class="field-input field-title"
                       placeholder="Task title...">
              </div>
              <div class="field-row">
                <div class="field field-half">
                  <label>Status</label>
                  <select x-model="modalEditStatus" class="field-input">
                    <template x-for="s in (overview?.statuses || [])" :key="s">
                      <option :value="s" x-text="s"></option>
                    </template>
                  </select>
                </div>
                <div class="field field-half">
                  <label>Priority</label>
                  <select x-model="modalEditPriority" class="field-input">
                    <option value="0">P0 — Critical</option>
                    <option value="1">P1 — High</option>
                    <option value="2">P2 — Medium</option>
                    <option value="3">P3 — Low</option>
                    <option value="4">P4 — Backlog</option>
                  </select>
                </div>
              </div>
              <div class="field">
                <label>Staff (assignee)</label>
                <input type="text"
                       x-model="modalEditClaimed"
                       class="field-input"
                       placeholder="Anyone's name...">
              </div>
              <div class="field">
                <label>Tags (comma-separated)</label>
                <input type="text"
                       x-model="modalEditTags"
                       class="field-input"
                       placeholder="bug, frontend, urgent...">
              </div>
              <div class="field">
                <label>Notes</label>
                <textarea x-model="modalEditNotes"
                          class="field-input field-textarea"
                          placeholder="Add notes here..."
                          rows="6"></textarea>
              </div>
              <div class="field metadata">
                <span x-show="modalTask.created" x-text="'Created: ' + modalTask.created"></span>
                <span x-show="modalTask.updated" x-text="'Updated: ' + modalTask.updated?.slice(0, 10)"></span>
                <span x-show="modalTask.createdBy" x-text="'By: ' + modalTask.createdBy"></span>
                <span x-show="modalTask.source" x-text="'Source: ' + modalTask.source"></span>
                <span x-show="modalTask.evidence?.length" x-text="'Evidence: ' + (modalTask.evidence || []).length + ' items'"></span>
                <span x-show="modalTask.deps?.length" x-text="'Deps: ' + (modalTask.deps || []).length"></span>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-save" @click="saveModal()">Save</button>
              <button class="btn-cancel" @click="closeModal()">Cancel</button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
