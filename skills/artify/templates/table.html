<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { --bg: #ffffff; --fg: #1a1a2e; --muted: #6b7280; --border: #e5e7eb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 2rem;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; font-weight: 600; }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
  .table-wrap {
    max-width: 1000px;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  thead { background: #f9fafb; }
  th {
    text-align: left;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-red { background: #fef2f2; color: #991b1b; }
  .badge-blue { background: #eff6ff; color: #1e40af; }
  .badge-yellow { background: #fefce8; color: #854d0e; }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
<p class="subtitle">{{SUBTITLE}}</p>
<div class="table-wrap">
{{TABLE_CONTENT}}
</div>
</body>
</html>
