<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #3b82f6;
    --surface: #f9fafb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 2rem;
    line-height: 1.6;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 600; }
  h2 { font-size: 1.2rem; margin-bottom: 0.75rem; font-weight: 600; color: var(--muted); }
  .container { max-width: 1200px; margin: 0 auto; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15em 0.4em;
    font-size: 0.9em;
  }
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
  }
  pre code { background: none; border: none; padding: 0; }
</style>
{{HEAD_EXTRA}}
</head>
<body>
<div class="container">
{{BODY_CONTENT}}
</div>
{{BODY_EXTRA}}
</body>
</html>
