<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #eef5f8;
      --panel: rgba(255,255,255,0.82);
      --line: rgba(38, 71, 96, 0.14);
      --text: #173042;
      --muted: #587286;
      --accent: #2b7a78;
      --accent-2: #2f6dc4;
      --paper: #ffffff;
      --error-bg: #fff3f2;
      --error-line: #efc0bb;
      --error-text: #9d3b31;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.5 "Trebuchet MS", Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(47,109,196,0.10), transparent 26%),
        radial-gradient(circle at top left, rgba(43,122,120,0.10), transparent 24%),
        linear-gradient(180deg, #f4f9fb, #e8f1f4);
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(340px, 490px) 1fr;
      gap: 18px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(39, 72, 95, 0.10);
      backdrop-filter: blur(12px);
      min-height: 0;
      overflow: hidden;
    }
    .editor-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }
    .hero {
      padding: 22px 22px 12px;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(47,109,196,0.10);
      color: var(--accent-2);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 22px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    button, select {
      appearance: none;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fcfeff, #edf5f8);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font: inherit;
    }
    button {
      cursor: pointer;
      font-weight: 700;
    }
    button.primary {
      background: linear-gradient(180deg, #2f80c8, #255fa1);
      color: #f7fbff;
      border-color: rgba(33, 80, 130, 0.28);
    }
    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 20px 22px;
      font: 14px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .tip {
      padding: 14px 22px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }
    .viewer {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }
    .viewer-head {
      padding: 22px 22px 12px;
    }
    .legend {
      padding: 0 22px 14px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 0.92rem;
    }
    .error-box {
      display: none;
      margin: 18px 22px 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--error-bg);
      border: 1px solid var(--error-line);
      color: var(--error-text);
      font: 13px/1.5 ui-monospace, monospace;
      white-space: pre-wrap;
    }
    .diagram-shell {
      min-height: 0;
      padding: 16px;
    }
    .diagram {
      min-height: 540px;
      height: 100%;
      border-radius: 20px;
      border: 1px solid rgba(38, 71, 96, 0.10);
      background: var(--paper);
      overflow: auto;
      padding: 20px;
    }
    .diagram svg {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }
    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
      .diagram { min-height: 420px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel editor-panel">
      <div class="hero">
        <div class="eyebrow">Graphviz Studio</div>
        <h1>{{TITLE}}</h1>
        <p>{{DESCRIPTION}}</p>
      </div>
      <div class="controls">
        <button class="primary" id="renderBtn">Render</button>
        <button id="sampleBtn">Load sample</button>
        <button id="clearBtn">Clear</button>
        <select id="engineSelect" aria-label="Layout engine">
          <option value="dot">dot</option>
          <option value="neato">neato</option>
          <option value="fdp">fdp</option>
          <option value="sfdp">sfdp</option>
          <option value="circo">circo</option>
          <option value="twopi">twopi</option>
          <option value="osage">osage</option>
        </select>
      </div>
      <textarea id="editor" spellcheck="false">{{INITIAL_DOT}}</textarea>
      <div class="tip">Tip: start with `digraph` plus `->`, keep labels quoted when they contain spaces, and use clusters for grouped systems.</div>
    </section>

    <section class="panel viewer">
      <div class="viewer-head">
        <div class="eyebrow">Preview</div>
        <h1>Rendered Graph</h1>
      </div>
      <div class="legend">Choose a layout engine, edit the DOT source, then click Render.</div>
      <div class="error-box" id="errorBox"></div>
      <div class="diagram-shell">
        <div class="diagram" id="diagramHost"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import * as Viz from "https://cdn.jsdelivr.net/npm/@viz-js/viz@3.25.0/+esm";

    const sample = `digraph {
  rankdir=LR;
  graph [pad=0.3, nodesep=0.5, ranksep=0.7];
  node [shape=box, style="rounded,filled", fillcolor="#e9f2ff", color="#5c82d6"];
  edge [color="#6f7f92"];

  Client -> API -> Worker -> DB;
  API -> Cache;
}`;

    const editor = document.getElementById('editor');
    const host = document.getElementById('diagramHost');
    const errorBox = document.getElementById('errorBox');
    const engineSelect = document.getElementById('engineSelect');

    const viz = await Viz.instance();

    function showError(err) {
      errorBox.style.display = 'block';
      errorBox.textContent = 'Graphviz render error:\n' + (err.message || String(err));
    }

    function clearError() {
      errorBox.style.display = 'none';
      errorBox.textContent = '';
    }

    function renderGraph(dot) {
      host.innerHTML = '';
      clearError();

      try {
        const svg = viz.renderSVGElement(dot.trim() || 'digraph { Empty }', {
          engine: engineSelect.value,
        });
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        host.appendChild(svg);
      } catch (err) {
        showError(err);
      }
    }

    document.getElementById('renderBtn').addEventListener('click', () => {
      renderGraph(editor.value);
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      editor.value = sample;
      engineSelect.value = 'dot';
      renderGraph(editor.value);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      editor.value = '';
      engineSelect.value = 'dot';
      renderGraph('digraph { Empty }');
    });

    renderGraph(editor.value || sample);
  </script>
</body>
</html>
