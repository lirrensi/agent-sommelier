<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --muted: #6b7280;
    --line: #d1d5db; --dot: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 2rem;
  }
  h1 { font-size: 1.4rem; margin-bottom: 2rem; font-weight: 600; text-align: center; }
  .timeline {
    position: relative;
    max-width: 800px;
    margin: 0 auto;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--line);
  }
  .event {
    position: relative;
    margin-bottom: 2rem;
    padding-left: 1.5rem;
  }
  .event::before {
    content: '';
    position: absolute;
    left: -29px;
    top: 6px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--dot);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 2px var(--dot);
  }
  .event-date {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .event-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0.25rem 0;
  }
  .event-desc {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .event-tag {
    display: inline-block;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 12px;
    background: #eff6ff;
    color: #3b82f6;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
<div class="timeline">
{{TIMELINE_EVENTS}}
</div>
</body>
</html>
