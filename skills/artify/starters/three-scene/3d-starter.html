<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Scene</title>
  <!--
    ============================================================
    THREE.JS STARTER — 3D scenes, product viewers, spatial viz
    ============================================================

    WHAT IT DOES:
    Renders a 3D scene with lighting, camera, and objects.
    Uses Three.js — the most popular WebGL library.

    THIS STARTER: Spinning geometric shapes with lighting.
    Mouse to orbit, scroll to zoom.

    HOW TO CUSTOMIZE:
    1. Add meshes: const mesh = new THREE.Mesh(geometry, material)
    2. Change geometries: BoxGeometry, SphereGeometry, TorusGeometry, etc.
    3. Change materials: MeshStandardMaterial, MeshBasicMaterial, MeshPhongMaterial
    4. Add lights: DirectionalLight, PointLight, AmbientLight
    5. Load models: GLTFLoader, OBJLoader (add CDN for loaders)

    THREE.JS CORE API:
    // Scene — the 3D world
    const scene = new THREE.Scene();

    // Camera — the viewpoint
    const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
    camera.position.set(x, y, z);

    // Renderer — draws to canvas
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Geometry — the shape
    new THREE.BoxGeometry(w, h, d)
    new THREE.SphereGeometry(radius, widthSeg, heightSeg)
    new THREE.TorusGeometry(radius, tube, radialSeg, tubularSeg)
    new THREE.ConeGeometry(radius, height, segments)
    new THREE.CylinderGeometry(rTop, rBot, height, segments)
    new THREE.PlaneGeometry(width, height)
    new THREE.TorusKnotGeometry(radius, tube, tubularSeg, radialSeg)

    // Material — the surface look
    new THREE.MeshBasicMaterial({ color }) — flat, no lighting
    new THREE.MeshStandardMaterial({ color, metalness, roughness }) — PBR
    new THREE.MeshPhongMaterial({ color, shininess }) — classic lighting
    new THREE.MeshNormalMaterial() — rainbow based on surface normal

    // Mesh — geometry + material combined
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, y, z);
    mesh.rotation.set(rx, ry, rz);
    mesh.scale.set(sx, sy, sz);
    scene.add(mesh);

    // Groups — combine meshes
    const group = new THREE.Group();
    group.add(mesh1);
    group.add(mesh2);
    scene.add(group);

    // Lights
    new THREE.AmbientLight(color, intensity) — even fill
    new THREE.DirectionalLight(color, intensity) — sun-like
    new THREE.PointLight(color, intensity, distance) — light bulb

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    // Loaders (add CDN for each):
    // GLTFLoader: https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js
    // OBJLoader: https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/OBJLoader.js
    // OrbitControls: https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js

    MORE DOCS: https://threejs.org/docs/

    ============================================================
  -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    .info {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-family: monospace;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="info">drag to orbit · scroll to zoom · press R to reset</div>

  <script>
    // ============================================================
    // SCENE SETUP
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    // ============================================================
    // CAMERA
    // fov, aspect, near clip, far clip
    // ============================================================
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    // ============================================================
    // RENDERER
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ============================================================
    // LIGHTS
    // ============================================================
    // Ambient — soft overall fill
    const ambient = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambient);

    // Directional — main light source (sun-like)
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Point light — colored accent
    const pointLight = new THREE.PointLight(0x3b82f6, 2, 20);
    pointLight.position.set(-3, 3, 2);
    scene.add(pointLight);

    // ============================================================
    // MATERIALS
    // Change metalness/roughness to alter surface look
    // ============================================================
    const blueMat = new THREE.MeshStandardMaterial({
      color: 0x3b82f6,
      metalness: 0.3,
      roughness: 0.4,
    });

    const orangeMat = new THREE.MeshStandardMaterial({
      color: 0xf97316,
      metalness: 0.5,
      roughness: 0.3,
    });

    const purpleMat = new THREE.MeshStandardMaterial({
      color: 0x8b5cf6,
      metalness: 0.2,
      roughness: 0.6,
    });

    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x334155,
      wireframe: true,
    });

    // ============================================================
    // MESHES — add your 3D objects here
    // ============================================================

    // Main cube
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 1.5, 1.5),
      blueMat
    );
    cube.position.set(-2, 0.75, 0);
    cube.castShadow = true;
    scene.add(cube);

    // Sphere
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1, 32, 32),
      orangeMat
    );
    sphere.position.set(1, 1, 0);
    sphere.castShadow = true;
    scene.add(sphere);

    // Torus
    const torus = new THREE.Mesh(
      new THREE.TorusGeometry(0.8, 0.3, 16, 50),
      purpleMat
    );
    torus.position.set(3.5, 0.8, -1);
    torus.castShadow = true;
    scene.add(torus);

    // Wireframe icosahedron (floating)
    const ico = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.6, 0),
      wireMat
    );
    ico.position.set(0, 3, -2);
    scene.add(ico);

    // Ground plane (receives shadows)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid helper
    const grid = new THREE.GridHelper(20, 20, 0x222222, 0x181818);
    scene.add(grid);

    // ============================================================
    // MOUSE ORBIT — simple orbit without OrbitControls CDN
    // ============================================================
    let isDragging = false;
    let prevMouse = { x: 0, y: 0 };
    let spherical = { theta: 0, phi: Math.PI / 3, radius: 8 };

    renderer.domElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      prevMouse = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;
      spherical.theta -= dx * 0.005;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.005));
      prevMouse = { x: e.clientX, y: e.clientY };
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      spherical.radius = Math.max(3, Math.min(20, spherical.radius + e.deltaY * 0.01));
    });

    // ============================================================
    // ANIMATION LOOP
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);

      const t = Date.now() * 0.001;

      // Rotate objects
      cube.rotation.x += 0.005;
      cube.rotation.y += 0.008;
      sphere.rotation.y += 0.003;
      torus.rotation.x += 0.006;
      torus.rotation.y += 0.004;
      ico.rotation.x += 0.01;
      ico.rotation.y += 0.015;
      ico.position.y = 3 + Math.sin(t) * 0.3;

      // Animate point light
      pointLight.position.x = Math.sin(t * 0.7) * 4;
      pointLight.position.z = Math.cos(t * 0.7) * 4;

      // Update camera from orbit
      camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
      camera.position.y = spherical.radius * Math.cos(spherical.phi);
      camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
      camera.lookAt(0, 1, 0);

      renderer.render(scene, camera);
    }

    animate();

    // ============================================================
    // RESIZE
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============================================================
    // RESET on R key
    // ============================================================
    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        spherical = { theta: 0, phi: Math.PI / 3, radius: 8 };
      }
    });
  </script>

</body>
</html>
