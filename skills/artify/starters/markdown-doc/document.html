<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!--
    ============================================================
    MARKDOWN DOC STARTER — Nice typography for rendered documents
    ============================================================

    WHAT IT DOES:
    Renders Markdown text as beautiful HTML with nice typography.
    Uses marked.js for parsing. Great for articles, docs, notes.

    HOW TO CUSTOMIZE:
    1. Replace the markdown string with your content
    2. Adjust CSS variables for fonts, colors, spacing
    3. Add syntax highlighting with highlight.js (optional)
    4. Add math with KaTeX (optional)

    MARKED.JS CORE API:
    marked.parse(markdownString) — returns HTML string

    MARKED OPTIONS:
    marked.setOptions({
      gfm: true,       // GitHub Flavored Markdown
      breaks: true,    // Convert \n to <br>
      pedantic: false,
    });

    MARKDOWN SYNTAX CHEAT SHEET:
    # H1          ## H2          ### H3
    **bold**      *italic*       ~~strike~~
    [link](url)   ![alt](img)
    - list item   1. numbered item
    > blockquote
    `inline code`
    ```language
    code block
    ```
    --- (horizontal rule)
    | col | col |   (table)
    |-----|-----|
    | val | val |

    GFM EXTENSIONS:
    - Task lists: - [x] done  - [ ] todo
    - Fenced code blocks with language tag
    - Tables with alignment: |:---|---:|:---:|
    - Autolinks: https://example.com
    - Strikethrough: ~~deleted~~

    OPTIONAL: Add syntax highlighting
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
    Then: marked.setOptions({ highlight: (code, lang) => hljs.highlight(code, { language: lang }).value });

    OPTIONAL: Add math rendering
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0/dist/katex.min.js"></script>

    MORE DOCS:
    - marked.js: https://marked.js.org/
    - Markdown guide: https://www.markdownguide.org/basic-syntax/

    ============================================================
  -->
  <!-- Optional: Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ============================================================
       TYPOGRAPHY SYSTEM — adjust these variables
       ============================================================ */
    :root {
      --font-body: 'Georgia', 'Times New Roman', serif;
      --font-heading: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --bg: #0f172a;
      --bg-code: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --border: #334155;
      --max-width: 720px;
      --line-height: 1.8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: var(--line-height);
      padding: 2rem 1rem;
    }

    /* ============================================================
       ARTICLE WRAPPER
       ============================================================ */
    .article {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    /* Headings */
    .article h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 2rem 0 1rem;
      color: #f8fafc;
    }
    .article h2 {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 2.5rem 0 0.75rem;
      color: #f1f5f9;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .article h3 {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 2rem 0 0.5rem;
      color: #e2e8f0;
    }
    .article h4 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: #cbd5e1;
    }

    /* Paragraphs */
    .article p {
      margin: 1rem 0;
    }

    /* Links */
    .article a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(59, 130, 246, 0.3);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }
    .article a:hover {
      text-decoration-color: var(--accent);
    }

    /* Bold & Italic */
    .article strong { color: #f8fafc; }
    .article em { font-style: italic; }

    /* Blockquotes */
    .article blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5rem 0;
      padding: 0.75rem 1.25rem;
      background: rgba(59, 130, 246, 0.05);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Lists */
    .article ul, .article ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }
    .article li {
      margin: 0.4rem 0;
    }
    .article li::marker {
      color: var(--accent);
    }

    /* Code — inline */
    .article code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15em 0.4em;
    }

    /* Code — blocks */
    .article pre {
      margin: 1.5rem 0;
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      line-height: 1.5;
    }
    .article pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85em;
    }

    /* Tables */
    .article table {
      width: 100%;
      margin: 1.5rem 0;
      border-collapse: collapse;
    }
    .article th, .article td {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    .article th {
      background: var(--bg-code);
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.9em;
      color: var(--text-muted);
    }

    /* Horizontal rule */
    .article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Images */
    .article img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1rem 0;
    }

    /* Task lists */
    .article input[type="checkbox"] {
      margin-right: 0.5rem;
      accent-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="article" id="content"></div>

  <script>
    // ============================================================
    // Configure marked with syntax highlighting
    // ============================================================
    marked.setOptions({
      gfm: true,
      breaks: false,
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    // ============================================================
    // YOUR MARKDOWN — replace this string with your content
    // ============================================================
    const markdown = `
# A Brief Guide to Writing Well

Good writing is clear thinking made visible. Here's how to get there.

## The Core Principles

### 1. Write for your reader

Every sentence should earn its place. Ask: *does my reader need this?*

> "The secret of good writing is to strip every sentence to its cleanest components."
> — William Zinsser

### 2. Prefer simple words

| Instead of | Write |
|---|---|
| utilize | use |
| facilitate | help |
| commence | start |
| terminate | end |

### 3. Cut ruthlessly

Your first draft is never your best draft. Here's a process:

- **Write** — get ideas down, don't self-edit
- **Rest** — step away for hours or days
- **Cut** — remove everything that doesn't serve the reader
- **Read aloud** — if it sounds wrong, it is wrong

## Code and Technical Writing

When writing about code, be specific:

\`\`\`javascript
// Bad: "Set up the thing"
// Good: "Initialize the WebSocket connection"
const ws = new WebSocket('wss://api.example.com/stream');

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  updateDashboard(data);
};
\`\`\`

Use \`inline code\` for variable names, function names, and short expressions.

## Common Mistakes

1. **Burying the lead** — put the most important information first
2. **Passive voice** — "The report was written by Sarah" → "Sarah wrote the report"
3. **Jargon without explanation** — define terms on first use
4. **Wall of text** — break paragraphs at logical points
5. **Missing examples** — abstract ideas need concrete illustrations

---

*This document was generated as a markdown-doc starter template.*
    `;

    // ============================================================
    // Render
    // ============================================================
    document.getElementById('content').innerHTML = marked.parse(markdown);
  </script>

</body>
</html>
