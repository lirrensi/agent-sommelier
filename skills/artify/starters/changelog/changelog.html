<!-- 
  ============================================================
  CHANGELOG / RELEASE NOTES STARTER
  ============================================================
  
  WHAT THIS IS:
  A changelog that people actually want to read. Instead of a
  wall of markdown that nobody scrolls through, this is a
  filterable, searchable, beautiful timeline of what changed.
  Each entry is categorized, tagged, and expandable for detail.
  
  USE THIS FOR:
  - Product changelogs / release notes
  - API versioning documentation
  - Internal release communications
  - Project history / decision log
  - Any "what changed over time" documentation
  
  HOW TO CUSTOMIZE:
  1. Replace the `releases` array in x-data with your releases
  2. Each release: { version, date, entries: [{ type, title, detail }] }
  3. Types: added, changed, fixed, removed, security, deprecated
  4. Add `breaking: true` to an entry for the breaking change badge
  5. For code diffs, add `diff: { old: "...", new: "..." }` to an entry
  6. Change product name in the header
  7. Adjust the upgrade guides between major versions
  
  CORE CONCEPTS:
  - Timeline layout uses CSS pseudo-elements (::before) for the line
  - Filtering is Alpine.js reactive — toggle a pill, list updates
  - Search uses Alpine.js computed/filtered list
  - Code highlighting runs on expand (hljs.highlightElement)
  - Diff view uses CSS grid for side-by-side layout
  
  GOTCHAS:
  - highlight.js must re-run on newly visible code blocks
  - Timeline line breaks on mobile — hide or adjust with media queries
  - Breaking changes should be visually distinct (red border, badge)
  - Keep entries to one line when collapsed — expand for detail
  
  MORE DOCS:
  - Alpine.js: https://alpinejs.dev/start-here
  - Highlight.js: https://highlightjs.org/
  - Keep a Changelog: https://keepachangelog.com/
  ============================================================
-->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vexi — Changelog</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark:       '#0d1117',
            card:       '#161b22',
            border:     '#30363d',
            muted:      '#8b949e',
            text:       '#e6edf3',
            accent:     '#58a6ff',
            green:      '#3fb950',
            blue:       '#58a6ff',
            yellow:     '#d29922',
            red:        '#f85149',
            purple:     '#bc8cff',
            gray:       '#8b949e',
          }
        }
      }
    }
  </script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    body { background-color: #0d1117; color: #e6edf3; }

    /* Timeline connector line */
    .timeline-line {
      position: relative;
    }
    .timeline-line::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 40px;
      bottom: -24px;
      width: 2px;
      background: linear-gradient(to bottom, #30363d 0%, #30363d 100%);
    }
    .timeline-line:last-child::before {
      display: none;
    }

    /* Timeline dot */
    .timeline-dot {
      position: absolute;
      left: 7px;
      top: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #161b22;
      border: 3px solid #58a6ff;
      z-index: 2;
    }
    .timeline-dot.major {
      border-color: #3fb950;
      box-shadow: 0 0 12px rgba(63, 185, 80, 0.4);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #58a6ff; }

    /* Code blocks inside cards */
    pre code.hljs {
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #30363d;
    }

    /* Diff styling */
    .diff-old  { background: rgba(248, 81, 73, 0.08); }
    .diff-new  { background: rgba(63, 185, 80, 0.08); }
    .diff-old code { color: #f85149; }
    .diff-new code { color: #3fb950; }

    /* Smooth expand */
    [x-show] { transition: all 0.2s ease; }

    /* Pill toggle */
    .pill-active {
      background-color: #58a6ff !important;
      color: #0d1117 !important;
      border-color: #58a6ff !important;
    }

    /* Upgrade guide stripe */
    .upgrade-stripe {
      border-left: 4px solid #d29922;
    }
  </style>
</head>

<body class="min-h-screen font-sans antialiased" x-data="changelogApp()">

  <!-- ========== HEADER ========== -->
  <header class="border-b border-border bg-card/60 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 py-6">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div class="flex items-center gap-3">
          <!-- Logo mark -->
          <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-accent to-purple flex items-center justify-center text-dark font-bold text-lg">V</div>
          <div>
            <h1 class="text-2xl font-bold text-text tracking-tight">Vexi Changelog</h1>
            <p class="text-muted text-sm">What's new in the Vexi platform</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-green/15 text-green border border-green/30">
            <span class="w-1.5 h-1.5 rounded-full bg-green animate-pulse"></span>
            Latest: v3.2.0
          </span>
          <!-- RSS link -->
          <a href="/changelog/feed.xml" title="Atom/RSS Feed"
             class="p-2 rounded-lg border border-border hover:border-accent hover:text-accent transition-colors text-muted">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.013 7.373 20 6.18 20 4.987 20 4 19.013 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1Z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- ========== FILTER BAR + SEARCH ========== -->
  <div class="border-b border-border bg-dark/80 backdrop-blur-sm sticky top-[88px] z-40">
    <div class="max-w-4xl mx-auto px-6 py-4">
      <div class="flex flex-col sm:flex-row sm:items-center gap-4">
        <!-- Search -->
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text"
                 x-model="search"
                 placeholder="Search releases..."
                 class="w-full pl-10 pr-4 py-2 rounded-lg border border-border bg-card text-text placeholder-muted text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
        </div>
        <!-- Type filter pills -->
        <div class="flex flex-wrap gap-2">
          <template x-for="type in types" :key="type.id">
            <button @click="toggleFilter(type.id)"
                    :class="activeFilters.includes(type.id) ? 'pill-active' : ''"
                    class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-150"
                    :style="!activeFilters.includes(type.id) ? `border-color: ${type.color}40; color: ${type.color}; background: ${type.color}10` : ''"
                    x-text="type.label">
            </button>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="max-w-4xl mx-auto px-6 py-10">

    <!-- Release count indicator -->
    <p class="text-muted text-sm mb-8" x-show="search || activeFilters.length">
      Showing <span class="text-text font-medium" x-text="filteredReleases.length"></span> release<span x-show="filteredReleases.length !== 1">s</span>
      <button @click="search = ''; activeFilters = []" class="ml-2 text-accent hover:underline text-xs">Clear filters</button>
    </p>

    <!-- ========== TIMELINE ========== -->
    <div class="space-y-2">

      <template x-for="(release, rIdx) in filteredReleases" :key="release.version">

        <div>

          <!-- Upgrade guide before major bumps -->
          <template x-if="release.upgradeGuide">
            <div class="upgrade-stripe bg-yellow/5 border border-yellow/20 rounded-lg p-6 mb-8">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-5 h-5 text-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 3l9.66 16.5H2.34L12 3z"/></svg>
                <h3 class="text-yellow font-bold text-lg">Upgrade Guide: <span x-text="release.upgradeGuide.title"></span></h3>
              </div>
              <div class="text-muted text-sm leading-relaxed space-y-3" x-html="release.upgradeGuide.body"></div>
            </div>
          </template>

          <!-- Release card -->
          <div class="timeline-line relative pl-10 pb-10">

            <!-- Timeline dot -->
            <div class="timeline-dot" :class="release.major ? 'major' : ''"></div>

            <!-- Version header -->
            <div class="flex items-baseline gap-3 mb-4">
              <h2 class="text-xl font-bold text-text" x-text="'v' + release.version"></h2>
              <span class="text-muted text-sm" x-text="release.date"></span>
              <template x-if="release.major">
                <span class="px-2 py-0.5 rounded text-xs font-semibold bg-green/15 text-green border border-green/30">Major</span>
              </template>
            </div>

            <!-- Entries -->
            <div class="space-y-3">
              <template x-for="(entry, eIdx) in release.entries" :key="eIdx">
                <div class="rounded-lg border transition-colors duration-150"
                     :class="entry.expanded ? 'border-accent/40 bg-card' : 'border-border bg-card/50 hover:bg-card hover:border-border'">

                  <!-- Entry row (click to expand) -->
                  <button @click="toggleEntry(release.version, eIdx)"
                          class="w-full text-left px-4 py-3 flex items-center gap-3 group">
                    <!-- Type badge -->
                    <span class="shrink-0 inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold"
                          :style="`background: ${typeColor(entry.type)}18; color: ${typeColor(entry.type)}; border: 1px solid ${typeColor(entry.type)}30`"
                          x-text="entry.type.charAt(0).toUpperCase() + entry.type.slice(1)">
                    </span>
                    <!-- Breaking badge -->
                    <template x-if="entry.breaking">
                      <span class="shrink-0 inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-red/15 text-red border border-red/30 animate-pulse">
                        &#9888; BREAKING
                      </span>
                    </template>
                    <!-- Title -->
                    <span class="text-sm text-text flex-1" x-text="entry.title"></span>
                    <!-- Expand icon -->
                    <svg class="w-4 h-4 text-muted transition-transform duration-200 shrink-0"
                         :class="entry.expanded ? 'rotate-180' : ''"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </button>

                  <!-- Expanded detail -->
                  <div x-show="entry.expanded"
                       x-transition:enter="transition ease-out duration-200"
                       x-transition:enter-start="opacity-0 -translate-y-1"
                       x-transition:enter-end="opacity-100 translate-y-0"
                       x-init="$watch('entry.expanded', v => { if(v) { $nextTick(() => { $el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)) }) } })"
                       class="px-4 pb-4 border-t border-border">

                    <!-- Detail text -->
                    <template x-if="entry.detail">
                      <div class="mt-3 text-sm text-muted leading-relaxed" x-html="entry.detail"></div>
                    </template>

                    <!-- Code diff -->
                    <template x-if="entry.diff">
                      <div class="mt-4">
                        <p class="text-xs text-muted uppercase tracking-wide mb-2 font-semibold">Diff</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                          <!-- Old -->
                          <div class="diff-old rounded-lg overflow-hidden border border-red/20">
                            <div class="px-3 py-1.5 bg-red/10 text-red text-xs font-semibold border-b border-red/20">Before</div>
                            <pre class="!m-0 !rounded-none"><code class="language-javascript" x-text="entry.diff.old"></code></pre>
                          </div>
                          <!-- New -->
                          <div class="diff-new rounded-lg overflow-hidden border border-green/20">
                            <div class="px-3 py-1.5 bg-green/10 text-green text-xs font-semibold border-b border-green/20">After</div>
                            <pre class="!m-0 !rounded-none"><code class="language-javascript" x-text="entry.diff.new"></code></pre>
                          </div>
                        </div>
                      </div>
                    </template>

                    <!-- Code snippet (single block) -->
                    <template x-if="entry.code && !entry.diff">
                      <div class="mt-4">
                        <p class="text-xs text-muted uppercase tracking-wide mb-2 font-semibold">Example</p>
                        <pre class="!m-0"><code class="language-javascript" x-text="entry.code"></code></pre>
                      </div>
                    </template>
                  </div>

                </div>
              </template>
            </div>

          </div>

        </div>

      </template>

      <!-- Empty state -->
      <div x-show="filteredReleases.length === 0" class="text-center py-20">
        <svg class="w-12 h-12 mx-auto text-muted mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p class="text-muted text-lg">No matching releases</p>
        <p class="text-muted text-sm mt-1">Try adjusting your filters or search</p>
      </div>

    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="mt-16 pt-8 border-t border-border text-center">
      <p class="text-muted text-sm">
        Vexi Changelog &middot; <a href="/changelog/feed.xml" class="text-accent hover:underline">RSS/Atom Feed</a> &middot;
        Follow <a href="https://twitter.com/vexidev" class="text-accent hover:underline">@vexidev</a>
      </p>
      <p class="text-muted text-xs mt-2">All dates are UTC. This changelog follows <a href="https://keepachangelog.com/" class="text-accent hover:underline">Keep a Changelog</a> conventions.</p>
    </footer>

  </main>

  <!-- ========== ALPINE APP ========== -->
  <script>
    function changelogApp() {
      return {
        search: '',
        activeFilters: [],
        expandedEntries: {},

        types: [
          { id: 'added',      label: 'Added',      color: '#3fb950' },
          { id: 'changed',    label: 'Changed',    color: '#58a6ff' },
          { id: 'fixed',      label: 'Fixed',      color: '#d29922' },
          { id: 'removed',    label: 'Removed',    color: '#f85149' },
          { id: 'security',   label: 'Security',   color: '#bc8cff' },
          { id: 'deprecated', label: 'Deprecated', color: '#8b949e' },
        ],

        typeColor(type) {
          const t = this.types.find(tt => tt.id === type);
          return t ? t.color : '#8b949e';
        },

        toggleFilter(id) {
          const idx = this.activeFilters.indexOf(id);
          if (idx > -1) this.activeFilters.splice(idx, 1);
          else this.activeFilters.push(id);
        },

        toggleEntry(version, idx) {
          const key = version + '-' + idx;
          // Find in releases and toggle expanded
          const release = this.releases.find(r => r.version === version);
          if (release && release.entries[idx]) {
            release.entries[idx].expanded = !release.entries[idx].expanded;
          }
        },

        get filteredReleases() {
          let result = this.releases;

          // Filter by search
          if (this.search) {
            const q = this.search.toLowerCase();
            result = result.map(r => {
              const versionMatch = r.version.toLowerCase().includes(q);
              const dateMatch = r.date.toLowerCase().includes(q);
              const matchingEntries = r.entries.filter(e =>
                e.title.toLowerCase().includes(q) ||
                (e.detail && e.detail.toLowerCase().includes(q))
              );
              if (versionMatch || dateMatch) return r;
              if (matchingEntries.length) return { ...r, entries: matchingEntries };
              return null;
            }).filter(Boolean);
          }

          // Filter by type
          if (this.activeFilters.length) {
            result = result.map(r => {
              const matchingEntries = r.entries.filter(e => this.activeFilters.includes(e.type));
              if (matchingEntries.length) return { ...r, entries: matchingEntries };
              return null;
            }).filter(Boolean);
          }

          return result;
        },

        // ==================== RELEASE DATA ====================
        releases: [
          // ────────────── v3.2.0 ──────────────
          {
            version: '3.2.0',
            date: 'March 8, 2026',
            major: false,
            entries: [
              {
                type: 'added',
                title: 'Real-time collaboration cursors in editor API',
                detail: 'New <code>presence</code> module allows you to track collaborator cursor positions, selections, and active tools in real time. Works over the existing WebSocket transport with no additional setup.',
                code: `const presence = vexi.presence.connect(channelId);

presence.on('cursor-move', (user, position) => {
  renderCursor(user.avatar, position);
});

presence.updateCursor({ x: 120, y: 340, tool: 'pen' });`,
                expanded: false,
              },
              {
                type: 'added',
                title: 'Batch export endpoint for workspace assets',
                detail: 'POST <code>/v2/assets/batch-export</code> accepts up to 200 asset IDs and returns a presigned zip URL. Supports <code>png</code>, <code>svg</code>, and <code>pdf</code> formats.',
                expanded: false,
              },
              {
                type: 'fixed',
                title: 'Rate limiter now correctly resets on timezone boundary',
                detail: 'Fixed an edge case where the sliding-window rate limiter would double-count requests that spanned a UTC midnight boundary, causing false 429 errors.',
                expanded: false,
              },
              {
                type: 'changed',
                title: 'Default pagination limit raised from 25 to 50',
                detail: 'The <code>limit</code> query parameter now defaults to <code>50</code> across all list endpoints. Maximum remains <code>100</code>. Existing integrations are unaffected unless they relied on implicit 25-item pages.',
                expanded: false,
              },
            ],
          },

          // ────────────── v3.1.0 ──────────────
          {
            version: '3.1.0',
            date: 'January 22, 2026',
            major: false,
            entries: [
              {
                type: 'added',
                title: 'Webhook signature verification helper',
                detail: 'New <code>vexi.webhooks.verify()</code> utility validates HMAC-SHA256 signatures from incoming webhook payloads. Eliminates boilerplate for Express, Fastify, and Cloudflare Workers.',
                code: `// Express middleware example
app.post('/webhooks/vexi', (req, res) => {
  const isValid = vexi.webhooks.verify({
    payload: req.body,
    signature: req.headers['x-vexi-signature'],
    secret: process.env.WEBHOOK_SECRET,
  });
  if (!isValid) return res.status(401).end();
  // handle event...
});`,
                expanded: false,
              },
              {
                type: 'fixed',
                title: 'OAuth token refresh race condition',
                detail: 'Resolved a race condition where concurrent requests could trigger multiple token refreshes simultaneously, exhausting the refresh token (which is single-use). Now uses an in-flight mutex to coalesce refresh calls.',
                expanded: false,
              },
              {
                type: 'security',
                title: 'Patched XSS in user-generated comment rendering',
                detail: 'Sanitized HTML comments that could execute arbitrary scripts when rendered in the dashboard. Added DOMPurify-based sanitization server-side before storage. <strong>CVE-2026-0142</strong> — CVSS 6.1 (Medium).',
                expanded: false,
              },
              {
                type: 'deprecated',
                title: 'Legacy /v1/projects endpoint',
                detail: 'The <code>/v1/projects</code> endpoint is now deprecated and will be removed in v4.0.0. Migrate to <code>/v2/workspaces</code> which supports team-scoped access and pagination.',
                expanded: false,
              },
            ],
          },

          // ────────────── v3.0.0 ──────────────
          {
            version: '3.0.0',
            date: 'October 15, 2025',
            major: true,
            upgradeGuide: {
              title: 'v2.x → v3.0',
              body: `
                <p><strong>1. Authentication:</strong> API keys are replaced by OAuth 2.1 client credentials. Create a new app in <strong>Settings → Developers</strong> and exchange your client ID/secret for an access token. API keys will stop working on <strong>January 1, 2026</strong>.</p>
                <p><strong>2. Base URL:</strong> Change <code>https://api.vexi.dev/v1</code> to <code>https://api.vexi.dev/v2</code>. All v1 endpoints return <code>410 Gone</code> with a migration header.</p>
                <p><strong>3. Response envelope:</strong> Responses no longer wrap data in <code>{ data: ... }</code>. The payload is returned directly. Update your SDK call sites accordingly.</p>
                <p><strong>4. Webhooks:</strong> Webhook payloads now include a <code>signature</code> header. Verify it using <code>vexi.webhooks.verify()</code> (see v3.1.0).</p>
              `,
            },
            entries: [
              {
                type: 'changed',
                title: 'OAuth 2.1 replaces API key authentication',
                breaking: true,
                detail: 'API keys are no longer accepted. All requests must include a Bearer token obtained via the OAuth 2.1 client credentials flow.',
                diff: {
                  old: `// Old: API key header
fetch('https://api.vexi.dev/v1/me', {
  headers: {
    'X-API-Key': 'vxi_live_abc123'
  }
});`,
                  new: `// New: OAuth 2.1 bearer token
const token = await vexi.auth.getToken({
  clientId: 'cli_xxx',
  clientSecret: 'sk_live_xxx'
});

fetch('https://api.vexi.dev/v2/me', {
  headers: {
    'Authorization': 'Bearer ' + token
  }
});`,
                },
                expanded: false,
              },
              {
                type: 'changed',
                title: 'Response envelope removed — data returned directly',
                breaking: true,
                detail: 'All API responses now return the resource directly instead of wrapping it in a <code>data</code> property. This aligns with JSON:API conventions and simplifies client parsing.',
                diff: {
                  old: `// Old envelope
{
  "data": {
    "id": "ws_123",
    "name": "Design Team"
  }
}`,
                  new: `// New — direct resource
{
  "id": "ws_123",
  "name": "Design Team"
}`,
                },
                expanded: false,
              },
              {
                type: 'added',
                title: 'Workspace-scoped access with team RBAC',
                detail: 'New permission model: assign roles (<code>owner</code>, <code>admin</code>, <code>editor</code>, <code>viewer</code>) at the workspace level. Scopes are enforced on every endpoint via the OAuth token claims.',
                expanded: false,
              },
              {
                type: 'removed',
                title: '/v1 API version fully retired',
                breaking: true,
                detail: 'All <code>/v1/*</code> endpoints now return <code>410 Gone</code>. Clients receive a <code>X-Migration-Url</code> header pointing to the v2 equivalent.',
                expanded: false,
              },
              {
                type: 'added',
                title: 'Event stream endpoint (SSE)',
                detail: 'New <code>GET /v2/events/stream</code> provides a Server-Sent Events feed for real-time updates. Supports filtering by workspace and event type. No WebSocket setup required.',
                code: `const source = new EventSource('/v2/events/stream?workspace=ws_123');
